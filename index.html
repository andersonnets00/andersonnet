<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andersonnet — Independent Internet & Cable Assistance</title>
    <meta
      name="description"
      content="Independent third-party informational assistance for Wi-Fi, streaming, connectivity, and cable concerns. Not an ISP."
    />
    <!-- GitHub Pages SPA redirect handler: restores the original path -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
